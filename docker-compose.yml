services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    # run the container process as the non-root user created in the Dockerfile (UID 1000)
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # required
      NODE_ENV: production
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb
      # If you need the container to chown mounted files on startup, set this to "true".
      # NOTE: chown requires the container to be started as root; by default the service
      # runs as UID 1000 (non-root). Use this only in a development flow where you start
      # the service as root for an init step or run a one-shot chown container.
      CHOWN_ON_STARTUP: "false"

      PRISMA_SEED_ON_START: "true"     # set "true" when you want to reseed
      PRISMA_STUDIO: "true"            # set "true" to auto-run Prismatudio
      PRISMA_STUDIO_PORT: "5555"
    ports:
      - "3000:3000"
      - "5555:5555"    # PrismaStudio
    restart: unless-stopped

volumes:
  postgres_data:
