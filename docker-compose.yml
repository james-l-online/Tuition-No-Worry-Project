services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # required
      NODE_ENV: production
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb

   
      PRISMA_SEED_ON_START: "true"     # set "true" when you want to reseed
      PRISMA_STUDIO: "true"            # set "true" to auto-run Studio
      PRISMA_STUDIO_PORT: "5555"
    ports:
      - "3000:3000"
      - "5555:5555"    # Studio
    restart: unless-stopped

volumes:
  postgres_data:
