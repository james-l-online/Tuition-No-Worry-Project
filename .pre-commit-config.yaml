repos:
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.26.3
    hooks:
      - id: yamllint
  - repo: https://github.com/awslabs/git-secrets
    rev: v1.3.0
    hooks:
      - id: git-secrets
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.8.8
    hooks:
      - id: prettier
        args: ["--tab-width=2"]
  - repo: https://github.com/zricethezav/gitleaks-pre-commit
    rev: v1.1.0
    hooks:
      - id: gitleaks
        args: ["--redact"]
