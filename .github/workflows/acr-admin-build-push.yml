name: ACR Build and Push (admin)

on:
  push:
    branches: [ "starter" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to ACR (admin)
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_ADMIN_USERNAME }}
          password: ${{ secrets.ACR_ADMIN_PASSWORD }}

      - name: Build and push image
        env:
          ACR_LOGIN: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=${ACR_LOGIN}/tuition-no-worry:${IMAGE_TAG}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Optional: Helm deploy
        if: ${{ env.HELM_DEPLOY == 'true' }}
        run: |
          helm upgrade --install tnw ./charts/tuition-no-worry -f charts/tuition-no-worry/values.yaml --set image.tag=${{ github.sha }}
