{{- if .Values.clerk.enabled }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "tnw-clerk-secret" }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: tnw-clerk-secret
  labels:
    app.kubernetes.io/name: {{ include "tuition-no-worry.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  CLERK_SECRET_KEY: {{ .Values.clerk.secretKey | b64enc | quote }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: {{ .Values.clerk.publishableKey | b64enc | quote }}
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: {{ .Values.clerk.signInUrl | b64enc | quote }}
{{- else }}
{{- /* Secret already exists in the namespace; skip creation to avoid conflicts. */ -}}
{{- end }}
{{- end }}
